<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niri Logo Color Editor</title>
  <link rel="stylesheet" href="style.css">
  </link>
</head>

<body>
  <h1>Niri Logo Color Editor</h1>

  <div class="button-container">
    <button class="svg-button" data-svg="logo.svg">logo.svg</button>
    <button class="svg-button" data-svg="smol-logo.svg">smol-logo.svg</button>
    <button class="svg-button" data-svg="icon.svg">icon.svg</button>
    <button class="svg-button" data-svg="smol-icon.svg">smol-icon.svg</button>
  </div>

  <div> color: <input type="color" id="colorInput" value="#2586b4"> </div>

  <div id="svgViewport"></div>

  <button id="open-svg">open svg</button>
  <p>after opening: right click -> save this page</p>

  <a id="github" href="https://github.com/humpitydumpitydumber/niri-customizer"> github </a>

  <script src="script.js"></script>
</body>

</html>
